
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Forecasting Studio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='ui_system.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='phase4_enterprise.css') }}">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body><div class="dashboard-layout">{% set active_page = "enterprise_ai" %}{% include "sidebar.html" %}
<main class="main-content phase4-main">
<section class="phase4-hero compact"><div><span class="phase4-label">Phase 4.4</span><h1>Forecasting Studio</h1><p>Generate projections and scenarios for <strong>{{ filename }}</strong>.</p></div></section>
<section class="phase4-card">
<form id="phase4ForecastForm" class="phase4-form-grid">
<div><label>Date Column</label><select id="phase4DateColumn">{% for column in date_columns %}<option value="{{ column }}">{{ column }}</option>{% endfor %}</select></div>
<div><label>Value Column</label><select id="phase4ValueColumn">{% for column in numeric_columns %}<option value="{{ column }}">{{ column }}</option>{% endfor %}</select></div>
<div><label>Forecast Periods</label><input id="phase4Periods" type="number" min="3" max="36" value="12"></div>
<button type="submit">Generate Forecast</button>
</form>
</section>
<section id="phase4ForecastStatus" class="phase4-status" hidden></section>
<section id="phase4ForecastResults" hidden>
<div id="phase4ForecastMetrics" class="phase4-kpi-grid"></div>
<article class="phase4-card"><div id="phase4ForecastChart" class="phase4-chart large"></div></article>
<article class="phase4-card"><div id="phase4ScenarioChart" class="phase4-chart large"></div></article>
</section>
</main></div>
<script>window.phase4ForecastConfig={filename:{{ filename|tojson }},endpoint:{{ url_for('phase4.forecasting_run')|tojson }}};</script>
<script src="{{ url_for('static', filename='phase4_enterprise.js') }}"></script></body></html>
